<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Datamailer{% endblock %}</title>
    <style>
      :root {
        color-scheme: light;
        --border: #d7dde5;
        --ink: #17202a;
        --muted: #5f6b7a;
        --surface: #f6f8fb;
      }

      body {
        margin: 0;
        color: var(--ink);
        font: 15px/1.5 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #fff;
      }

      header {
        border-bottom: 1px solid var(--border);
        background: var(--surface);
      }

      nav {
        display: flex;
        align-items: center;
        gap: 24px;
        max-width: 1120px;
        margin: 0 auto;
        padding: 14px 20px;
      }

      nav a {
        color: var(--ink);
        text-decoration: none;
      }

      nav .brand {
        font-weight: 700;
      }

      main {
        max-width: 1120px;
        margin: 0 auto;
        padding: 32px 20px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 28px;
        line-height: 1.2;
      }

      p {
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <header>
      <nav aria-label="Main">
        <a class="brand" href="{% url 'mailing:dashboard' %}">Datamailer</a>
        <a href="/admin/">Admin</a>
      </nav>
    </header>
    <main>
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
