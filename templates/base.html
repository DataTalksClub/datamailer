<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Datamailer{% endblock %}</title>
    <style>
      :root {
        color-scheme: light;
        --border: #d7dde5;
        --ink: #17202a;
        --muted: #5f6b7a;
        --surface: #f6f8fb;
        --surface-strong: #eef3f8;
        --accent: #1f6feb;
        --danger: #b42318;
        --success: #157347;
      }

      body {
        margin: 0;
        color: var(--ink);
        font: 15px/1.5 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #fff;
      }

      header {
        border-bottom: 1px solid var(--border);
        background: var(--surface);
      }

      nav {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 18px;
        max-width: 1120px;
        margin: 0 auto;
        padding: 14px 20px;
      }

      nav a {
        color: var(--ink);
        text-decoration: none;
      }

      nav a:hover {
        text-decoration: underline;
      }

      nav .brand {
        font-weight: 700;
      }

      main {
        max-width: 1120px;
        margin: 0 auto;
        padding: 32px 20px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 28px;
        line-height: 1.2;
      }

      h2 {
        margin: 28px 0 12px;
        font-size: 20px;
        line-height: 1.25;
      }

      h3 {
        margin: 18px 0 8px;
        font-size: 16px;
      }

      p {
        color: var(--muted);
      }

      a {
        color: var(--accent);
      }

      a:focus-visible,
      button:focus-visible,
      input:focus-visible,
      select:focus-visible {
        outline: 3px solid #8ab4f8;
        outline-offset: 2px;
      }

      .page-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 18px;
        margin-bottom: 22px;
      }

      .muted {
        color: var(--muted);
      }

      .meta-grid,
      .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 12px;
        margin: 18px 0 24px;
      }

      .stat,
      .meta-item,
      .empty-state {
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 12px;
        background: #fff;
      }

      .stat-value {
        display: block;
        font-size: 24px;
        font-weight: 700;
        line-height: 1.15;
      }

      .stat-label,
      .meta-label {
        display: block;
        color: var(--muted);
        font-size: 13px;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        min-height: 24px;
        padding: 0 8px;
        border-radius: 999px;
        color: var(--ink);
        background: var(--surface-strong);
        font-size: 13px;
        font-weight: 600;
        white-space: nowrap;
      }

      .badge.danger {
        color: var(--danger);
        background: #fff0ee;
      }

      .badge.success {
        color: var(--success);
        background: #edf8f1;
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        align-items: end;
        gap: 10px;
        margin: 16px 0;
      }

      .filter-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 12px;
        align-items: end;
        margin: 16px 0;
      }

      .checkbox-list {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
        gap: 6px 12px;
      }

      .checkbox-list label {
        display: flex;
        align-items: center;
        gap: 6px;
        color: var(--ink);
        font-weight: 400;
      }

      .checkbox-list input {
        width: auto;
        min-height: 0;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 10px;
      }

      .messages {
        display: grid;
        gap: 8px;
        margin: 0 0 18px;
        padding: 0;
        list-style: none;
      }

      .message {
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px 12px;
        background: var(--surface);
      }

      .message.success {
        color: var(--success);
        border-color: #b8dec4;
        background: #edf8f1;
      }

      .message.error {
        color: var(--danger);
        border-color: #f0b8b2;
        background: #fff0ee;
      }

      .form-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
      }

      .form-field.full {
        grid-column: 1 / -1;
      }

      .form-field input,
      .form-field select,
      .form-field textarea {
        width: 100%;
        box-sizing: border-box;
      }

      .field-errors,
      .form-errors {
        margin: 6px 0 0;
        color: var(--danger);
      }

      label {
        display: block;
        color: var(--muted);
        font-size: 13px;
        font-weight: 600;
      }

      input,
      select,
      button,
      .button {
        min-height: 38px;
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 7px 10px;
        font: inherit;
        background: #fff;
      }

      button,
      .button {
        color: #fff;
        border-color: var(--accent);
        background: var(--accent);
        cursor: pointer;
        text-decoration: none;
      }

      .button.secondary {
        color: var(--ink);
        border-color: var(--border);
        background: #fff;
      }

      button.danger,
      .button.danger {
        color: #fff;
        border-color: var(--danger);
        background: var(--danger);
      }

      .table-wrap {
        width: 100%;
        overflow-x: auto;
        border: 1px solid var(--border);
        border-radius: 8px;
      }

      table {
        width: 100%;
        min-width: 760px;
        border-collapse: collapse;
        background: #fff;
      }

      th,
      td {
        padding: 10px 12px;
        border-bottom: 1px solid var(--border);
        text-align: left;
        vertical-align: top;
      }

      th {
        color: var(--muted);
        background: var(--surface);
        font-size: 13px;
        font-weight: 700;
      }

      tr:last-child td {
        border-bottom: 0;
      }

      .nowrap {
        white-space: nowrap;
      }

      .truncate {
        max-width: 280px;
        overflow-wrap: anywhere;
      }

      .pagination {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 10px;
        margin: 16px 0;
      }

      .timeline {
        display: grid;
        gap: 10px;
      }

      .timeline-item {
        border-left: 4px solid var(--accent);
        padding: 10px 12px;
        background: var(--surface);
      }

      @media (max-width: 640px) {
        main {
          padding: 24px 14px;
        }

        .page-header {
          display: block;
        }

        .toolbar > * {
          width: 100%;
        }

        .actions {
          justify-content: stretch;
        }

        .form-grid {
          grid-template-columns: 1fr;
        }

        input,
        select,
        button,
        .button {
          width: 100%;
          box-sizing: border-box;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <nav aria-label="Main">
        <a class="brand" href="{% url 'mailing:dashboard' %}">Datamailer</a>
        <a href="{% url 'mailing:campaign_list' %}">Campaigns</a>
        <a href="{% url 'mailing:audience_list' %}">Audiences</a>
        <a href="{% url 'mailing:client_list' %}">Clients</a>
        <a href="{% url 'mailing:contact_search' %}">Contacts</a>
        <a href="{% url 'mailing:template_catalog' %}">Templates</a>
        <a href="{% url 'mailing:api_docs' %}">API Docs</a>
        <a href="/admin/">Admin</a>
      </nav>
    </header>
    <main>
      {% if messages %}
        <ul class="messages">
          {% for message in messages %}
            <li class="message {{ message.tags }}">{{ message }}</li>
          {% endfor %}
        </ul>
      {% endif %}
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
