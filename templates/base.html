{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Datamailer{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'mailing/css/app.css' %}">
  </head>
  <body>
    <header class="app-header">
      <nav class="app-nav" aria-label="Main">
        <a class="brand" href="{% url 'mailing:dashboard' %}" {% if request.resolver_match.url_name == "dashboard" %}aria-current="page"{% endif %}>Datamailer</a>
        <a href="{% url 'mailing:campaign_list' %}" {% if request.resolver_match.url_name == "campaign_list" or request.resolver_match.url_name == "campaign_create" or request.resolver_match.url_name == "campaign_detail" or request.resolver_match.url_name == "campaign_edit" %}aria-current="page"{% endif %}>Campaigns</a>
        <a href="{% url 'mailing:audience_list' %}" {% if request.resolver_match.url_name == "audience_list" or request.resolver_match.url_name == "audience_create" or request.resolver_match.url_name == "audience_detail" or request.resolver_match.url_name == "audience_edit" or request.resolver_match.url_name == "tag_create" or request.resolver_match.url_name == "tag_detail" or request.resolver_match.url_name == "tag_edit" %}aria-current="page"{% endif %}>Audiences</a>
        <a href="{% url 'mailing:client_list' %}" {% if request.resolver_match.url_name == "client_list" or request.resolver_match.url_name == "client_create" or request.resolver_match.url_name == "client_detail" or request.resolver_match.url_name == "client_edit" %}aria-current="page"{% endif %}>Clients</a>
        <a href="{% url 'mailing:contact_search' %}" {% if request.resolver_match.url_name == "contact_search" or request.resolver_match.url_name == "contact_detail" %}aria-current="page"{% endif %}>Contacts</a>
        <a href="{% url 'mailing:template_catalog' %}" {% if request.resolver_match.url_name == "template_catalog" or request.resolver_match.url_name == "template_detail" %}aria-current="page"{% endif %}>Templates</a>
        <a href="{% url 'mailing:api_docs' %}" {% if request.resolver_match.url_name == "api_docs" or request.resolver_match.url_name == "api_docs_json" %}aria-current="page"{% endif %}>API Docs</a>
        <a href="/admin/">Admin</a>
      </nav>
    </header>
    <main class="app-main">
      {% if messages %}
        <ul class="messages">
          {% for message in messages %}
            <li class="message {{ message.tags }}">{{ message }}</li>
          {% endfor %}
        </ul>
      {% endif %}
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
